<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Display</title>

    <style>
        body {
            font-family: Arial;
            background: #0d0d0d;
            color: white;
            text-align: center;
        }

        h2 { margin-top: 20px; }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4caf50;
            color: white;
            font-weight: bold;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 85%;
            margin-top: 20px;
        }

        th, td {
            padding: 14px;
            border: 1px solid #333;
        }

        th { background: #1c1c1c; }

        #stats {
            margin:15px;
            font-size:18px;
            font-weight:bold;
            padding:10px;
            background:#1b5e20;
            border-radius:5px;
        }

        .row-big { font-size: 18px; font-weight: bold; }
        .overload { background: #ff1744 !important; }
        .limit { background: #f9a825 !important; }
        .ok { background: #1b5e20 !important; }
        .nodata { background: #424242 !important; }
    </style>
</head>

<body>

<h2>Kitchen Display System</h2>

<div id="stats">Loading...</div>

<!-- ORDER -->
<div>
    <input id="dishName" list="dishList" placeholder="Dish name">
    <datalist id="dishList"></datalist>

    <input id="dishQty" type="number" placeholder="Qty">
    <button onclick="addOrder()">Add Order</button>
</div>

<!-- PREDICTION -->
<div>
    <!-- 🔥 FIX -->
    <input id="predName" list="dishList" placeholder="Dish">

    <input id="predValue" type="number" placeholder="Predicted">
    <button onclick="setPrediction()">Set Prediction</button>
</div>

<button onclick="downloadReport()">Download Report</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Pending</th>
<th>Created-till-now</th>
<th>Predicted</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<script>

// WebSocket
const protocol = location.protocol === "https:" ? "wss:" : "ws:";
const socket = new WebSocket(`${protocol}//${location.host}/ws`);
socket.onmessage = () => fetchData();

// 🔥 AUTOCOMPLETE (BOTH INPUTS)
const dishInput = document.getElementById("dishName");
const predInput = document.getElementById("predName");
const dataList = document.getElementById("dishList");

let debounce;

dishInput.addEventListener("input", handleSuggest);
predInput.addEventListener("input", handleSuggest);

function handleSuggest(e) {
    clearTimeout(debounce);

    let query = e.target.value.trim();
    if (!query) {
        dataList.innerHTML = "";
        return;
    }

    debounce = setTimeout(async () => {
        let res = await fetch(`/suggest?q=${query}`);
        let data = await res.json();

        dataList.innerHTML = "";
        data.forEach(name => {
            let opt = document.createElement("option");
            opt.value = name;
            dataList.appendChild(opt);
        });
    }, 200);
}

// बाकी code same
function safeId(name) {
    return name.replace(/\s+/g, "-").toLowerCase();
}

async function fetchData() {
    let res = await fetch("/dishes");
    let data = await res.json();

    let table = document.getElementById("table-body");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="7">No Orders Yet</td></tr>`;
        return;
    }

    let totalPending = 0;
    let totalCompleted = 0;

    data.forEach(d => {

        let total = d.pending + d.completed;

        let status = "NO DATA";
        let className = "nodata";

        if (d.predicted > 0) {
            if (total < d.predicted) {
                status = "OK";
                className = "ok";
            } else if (total === d.predicted) {
                status = "LIMIT";
                className = "limit";
            } else {
                status = "OVERLOAD";
                className = "overload";
            }
        }

        totalPending += d.pending;
        totalCompleted += d.completed;

        let id = safeId(d.name);

        table.innerHTML += `
        <tr class="${className} row-big">
            <td>${d.name}</td>
            <td>${d.pending + d.completed}</td>
            <td>${d.pending}</td>
            <td>${d.completed}</td>
            <td>${d.predicted}</td>
            <td>${status}</td>
            <td>
                ${
                    d.pending > 0
                    ? `<button onclick="markDone('${d.name}')">DONE</button>`
                    : `<button disabled>DONE</button>`
                }
            </td>
        </tr>`;
    });

    document.getElementById("stats").innerHTML =
        `Pending: ${totalPending} | Completed: ${totalCompleted}`;
}

async function addOrder() {
    let name = dishName.value;
    let qty = parseInt(dishQty.value);

    if (!name || qty <= 0) return alert("Invalid input");

    await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, quantity: qty})
    });

    dishName.value = "";
    dishQty.value = "";
}

async function markDone(name) {
    await fetch("/done", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, quantity: 1})
    });
}

async function setPrediction() {
    let name = predName.value;
    let val = parseInt(predValue.value);

    if (!name || val < 0) return alert("Invalid");

    await fetch("/prediction", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, predicted: val})
    });

    predName.value = "";
    predValue.value = "";
}

function downloadReport() {
    window.open("/report");
}

fetchData();

</script>

</body>
</html>
