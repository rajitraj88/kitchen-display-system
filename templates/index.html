<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Display</title>

    <style>
        body {
            font-family: Arial;
            background: #0d0d0d;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4caf50;
            color: white;
            font-weight: bold;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #333;
        }

        th {
            background: #1c1c1c;
        }

        #stats {
            margin:15px;
            font-size:18px;
            font-weight:bold;
            padding:10px;
            background:#1b5e20;
            border-radius:5px;
        }
    </style>
</head>

<body>

<h2>Kitchen Display System</h2>

<div id="stats">Loading...</div>

<!-- ORDER INPUT -->
<div>
    <input id="dishName" list="dishList" placeholder="Dish name" />
    <datalist id="dishList"></datalist>

    <input id="dishQty" type="number" placeholder="Qty" />
    <button id="addBtn" onclick="addOrder()">Add Order</button>
</div>

<!-- REPORT -->
<div style="margin-top:15px;">
    <button onclick="downloadReport()">Download Report</button>
</div>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Pending</th>
            <th>Produced</th>
            <th>Predicted</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>

const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const socket = new WebSocket(`${protocol}//${window.location.host}/ws`);
socket.onmessage = () => fetchData();

function playAlert() {
    new Audio("https://www.soundjay.com/buttons/beep-07.wav").play();
}

async function fetchData() {
    let res = await fetch("/dishes");
    let data = await res.json();

    data.sort((a, b) => b.pending - a.pending);

    let table = document.getElementById("table-body");
    table.innerHTML = "";

    let totalPending = 0;
    let totalCompleted = 0;
    let overloadFound = false;

    data.forEach(dish => {

        let color = "";
        let status = "";
        let statusColor = "";

        // 🔥 UPDATED STATUS LOGIC (with IDLE)
        if (dish.pending === 0 && dish.predicted === 0) {
            color = "#424242";
            status = "IDLE";
            statusColor = "#9e9e9e";
        }
        else if (dish.pending < dish.predicted) {
            color = "#1b5e20";
            status = "OK";
            statusColor = "#4caf50";
        }
        else if (dish.pending === dish.predicted) {
            color = "#f9a825";
            status = "LIMIT";
            statusColor = "#ff9800";
        }
        else {
            color = "#b71c1c";
            status = "OVERLOAD";
            statusColor = "#f44336";
            overloadFound = true;
        }

        totalPending += dish.pending;
        totalCompleted += dish.completed;

        let row = `
        <tr style="background:${color}">
            <td>${dish.name}</td>
            <td>${dish.pending}</td>
            <td>${dish.completed}</td>
            <td>${dish.predicted}</td>
            <td style="color:${statusColor}; font-weight:bold">${status}</td>
            <td>
                ${
                    dish.pending > 0
                    ? `
                    <input type="number" min="1" max="${dish.pending}" value="1" id="qty-${dish.name}" style="width:60px;">
                    <button onclick="markDone('${dish.name}')">DONE</button>
                    `
                    : "All Done"
                }
            </td>
        </tr>
        `;

        table.innerHTML += row;
    });

    document.getElementById("stats").innerHTML =
        `Pending: ${totalPending} | Completed: ${totalCompleted}`;

    if (overloadFound) playAlert();
}

async function addOrder() {
    let name = document.getElementById("dishName").value.trim();
    let qty = parseInt(document.getElementById("dishQty").value);

    if (!name || !qty || qty <= 0) {
        alert("Valid input required");
        return;
    }

    await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, quantity: qty})
    });

    document.getElementById("dishName").value = "";
    document.getElementById("dishQty").value = "";
}

async function markDone(name) {
    let qty = parseInt(document.getElementById(`qty-${name}`).value);

    if (!qty || qty <= 0) {
        alert("Invalid quantity");
        return;
    }

    await fetch("/done", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, quantity: qty})
    });
}

function downloadReport() {
    window.open("/report", "_blank");
}

// Autocomplete
const input = document.getElementById("dishName");
const datalist = document.getElementById("dishList");

input.addEventListener("input", async () => {
    let query = input.value;

    if (!query) return;

    let res = await fetch(`/suggest?q=${query}`);
    let data = await res.json();

    datalist.innerHTML = "";

    data.forEach(name => {
        let option = document.createElement("option");
        option.value = name;
        datalist.appendChild(option);
    });
});

fetchData();

</script>

</body>
</html>
