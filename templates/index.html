<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Display</title>

    <style>
        body {
            font-family: Arial;
            background: #0d0d0d;
            color: white;
            text-align: center;
        }

        h2 { margin-top: 20px; }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4caf50;
            color: white;
            font-weight: bold;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 85%;
            margin-top: 20px;
        }

        th, td {
            padding: 14px;
            border: 1px solid #333;
        }

        th { background: #1c1c1c; }

        #stats {
            margin:15px;
            font-size:18px;
            font-weight:bold;
            padding:10px;
            background:#1b5e20;
            border-radius:5px;
        }

        .row-big { font-size: 18px; font-weight: bold; }
        .overload { background: #ff1744 !important; }
        .limit { background: #f9a825 !important; }
        .ok { background: #1b5e20 !important; }
        .nodata { background: #424242 !important; }
    </style>
</head>

<body>

<h2>Kitchen Display System</h2>

<div id="stats">Loading...</div>

<!-- ORDER -->
<div>
    <input id="dishName" list="dishList" placeholder="Dish name">
    <datalist id="dishList"></datalist>

    <input id="dishQty" type="number" placeholder="Qty">
    <button onclick="addOrder()">Add Order</button>
</div>

<!-- PREDICTION -->
<div>
    <input id="predName" placeholder="Dish">
    <input id="predValue" type="number" placeholder="Predicted">
    <button onclick="setPrediction()">Set Prediction</button>
</div>

<button onclick="downloadReport()">Download Report</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Qty</th> <!-- NEW -->
<th>Pending</th>
<th>Created-till-now</th> <!-- RENAMED -->
<th>Predicted</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<script>

// WebSocket (deploy safe)
const protocol = location.protocol === "https:" ? "wss:" : "ws:";
const socket = new WebSocket(`${protocol}//${location.host}/ws`);
socket.onmessage = () => fetchData();

// Autocomplete
const dishInput = document.getElementById("dishName");
const dataList = document.getElementById("dishList");

let debounce;
dishInput.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(loadSuggestions, 200);
});

async function loadSuggestions() {
    let query = dishInput.value;
    if (!query) return;

    let res = await fetch(`/suggest?q=${query}`);
    let data = await res.json();

    dataList.innerHTML = "";
    data.forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        dataList.appendChild(opt);
    });
}

// Utils
function safeId(name) {
    return name.replace(/\s+/g, "-").toLowerCase();
}

// Fetch Data
async function fetchData() {
    let res = await fetch("/dishes");
    let data = await res.json();

    let table = document.getElementById("table-body");
    table.innerHTML = "";

    // ✅ Empty state
    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="7">No Orders Yet</td></tr>`;
        return;
    }

    data.sort((a, b) => (b.pending + b.completed) - (a.pending + a.completed));

    let totalPending = 0;
    let totalCompleted = 0;

    data.forEach(d => {

        let total = d.pending + d.completed;

        let status = "NO DATA";
        let className = "nodata";

        if (d.predicted > 0) {
            if (total < d.predicted) {
                status = "OK";
                className = "ok";
            } else if (total === d.predicted) {
                status = "LIMIT";
                className = "limit";
            } else {
                status = "OVERLOAD";
                className = "overload";
            }
        }

        totalPending += d.pending;
        totalCompleted += d.completed;

        let id = safeId(d.name);

        table.innerHTML += `
        <tr class="${className} row-big">
            <td>${d.name}</td>
            <td>${d.pending + d.completed}</td> <!-- Qty -->
            <td>${d.pending}</td>
            <td>${d.completed}</td>
            <td>${d.predicted}</td>
            <td style="font-size:18px; font-weight:bold;">${status}</td>
            <td>
                ${
                    d.pending > 0
                    ? `
                        <input type="number" min="1" max="${d.pending}" value="1" id="qty-${id}" style="width:60px;">
                        <button onclick="markDone('${d.name}')">DONE</button>
                    `
                    : `<button disabled>DONE</button>`
                }
            </td>
        </tr>`;
    });

    document.getElementById("stats").innerHTML =
        `Pending: ${totalPending} | Completed: ${totalCompleted}`;
}

// Add Order
async function addOrder() {
    let name = dishName.value;
    let qty = parseInt(dishQty.value);

    if (!name || qty <= 0) return alert("Invalid input");

    await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, quantity: qty})
    });

    dishName.value = "";
    dishQty.value = "";
}

// Done
async function markDone(name) {
    let id = safeId(name);
    let input = document.getElementById(`qty-${id}`);

    let qty = parseInt(input.value);
    let pending = parseInt(input.max);

    if (qty > pending) {
        alert(`Only ${pending} items pending`);
        return;
    }

    await fetch("/done", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, quantity: qty})
    });
}

// Prediction
async function setPrediction() {
    let name = predName.value;
    let val = parseInt(predValue.value);

    if (!name || val < 0) return alert("Invalid");

    await fetch("/prediction", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, predicted: val})
    });

    predName.value = "";
    predValue.value = "";
}

// Report
function downloadReport() {
    window.open("/report");
}

fetchData();

</script>

</body>
</html>
